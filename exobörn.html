<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EXOBÖRN</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #ui { width: 800px; display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 2px solid #00ff41; padding-bottom: 5px; text-shadow: 0 0 5px #00ff41; }
        canvas { border: 4px solid #111; background: #020202; box-shadow: 0 0 30px rgba(0, 255, 65, 0.1); cursor: crosshair; }
        .controls { margin-top: 15px; font-size: 0.8em; color: #555; text-align: center; line-height: 1.5; }
        #initials-overlay { position: absolute; background: rgba(0,0,0,0.95); border: 2px solid #00ff41; padding: 30px; display: none; text-align: center; z-index: 100; box-shadow: 0 0 50px #000; }
        .letter { font-size: 40px; margin: 0 10px; display: inline-block; width: 40px; border-bottom: 3px solid #00ff41; }
        .letter.active { color: #fff; border-color: #fff; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="ui">
        <div>BANK: $<span id="bank">0</span></div>
        <div style="color: #fff; font-weight: bold; letter-spacing: 4px;">EXOBÖRN</div>
        <div>CURRENT: $<span id="current">0</span></div>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    
    <div id="msg" style="position: absolute; color: white; background: rgba(0,0,0,0.9); padding: 20px; display: none; text-align: center; border: 1px solid #00ff41; max-width: 400px; line-height: 1.6;"></div>
    
    <div id="initials-overlay">
        <h2 style="color: #ffd700;">NEW TOP SCORE</h2>
        <p>ENTER YOUR INITIALS</p>
        <div id="initials-container">
            <span class="letter active" id="l0">A</span>
            <span class="letter" id="l1">A</span>
            <span class="letter" id="l2">A</span>
        </div>
        <p style="font-size: 0.7em; margin-top: 20px; color: #555;">UP/DOWN: Change | SPACE: Confirm</p>
    </div>

    <div class="controls">
        SPACE: Jump | DOWN: Duck | CLICK PLATFORM: Grapple <br>
        E: Extraction ($5000+) | R: Deploy
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bankEl = document.getElementById('bank');
        const currentEl = document.getElementById('current');
        const msgEl = document.getElementById('msg');
        const initialsOverlay = document.getElementById('initials-overlay');

        let bank = 0;
        let wallet = 0;
        let gameActive = true;
        let animationFrameId;
        let lastTime = 0;
        let enteringScore = false;
        let currentInitials = ['A', 'A', 'A'];
        let charIndex = 0;
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#";

        // Physics Constants
        const GRAVITY = 0.6;
        const JUMP_POWER = -13;
        const AIR_FRICTION = 0.985;
        const GROUND_FRICTION = 0.82;
        const SWING_BOOST = 0.4;
        
        let coyoteTime = 0;
        let jumpBuffer = 0;

        const player = {
            x: 100, y: 200, w: 26, h: 46,
            vx: 0, vy: 0, 
            isGrounded: false,
            isDucking: false,
            hook: { active: false, x: 0, y: 0, length: 0 }
        };

        let platforms = [];
        let items = [];
        let obstacles = [];
        let baseSpeed = 4.5;
        let scrollSpeed = baseSpeed;
        let frameCount = 0;
        let keys = {};

        // High Score Logic
        let highScores = JSON.parse(localStorage.getItem('exoborn_scores')) || [
            { name: 'SAB', score: 10000 },
            { name: 'RED', score: 7500 },
            { name: 'RUN', score: 5000 },
            { name: 'BCK', score: 3000 },
            { name: 'VOD', score: 1000 }
        ];

        function initLevel() {
            platforms = [
                { x: 0, y: 350, w: 1000, h: 50 },
                { x: 1200, y: 350, w: 800, h: 50 }
            ];
            items = [];
            obstacles = [];
            player.x = 100;
            player.y = 200;
            player.vx = 0;
            player.vy = 0;
            player.hook.active = false;
            wallet = 0;
            scrollSpeed = baseSpeed;
            updateUI();
            gameActive = true;
            enteringScore = false;
            msgEl.style.display = "none";
            initialsOverlay.style.display = "none";
            lastTime = performance.now();
        }

        function updateUI() {
            currentEl.innerText = wallet;
            bankEl.innerText = bank;
            scrollSpeed = baseSpeed + (wallet / 2000);
        }

        function spawnEntities() {
            frameCount++;
            let spawnRate = Math.max(25, 70 - Math.floor(scrollSpeed * 2)); 
            
            if (frameCount % spawnRate === 0) {
                platforms.push({ x: 800, y: 350, w: 300 + Math.random() * 400, h: 50 });
            }
            if (frameCount % 110 === 0 && Math.random() > 0.4) {
                platforms.push({ x: 800, y: 120 + Math.random() * 120, w: 180, h: 20 });
            }
            if (frameCount % 90 === 0) {
                items.push({ x: 850, y: 80 + Math.random() * 200, w: 16, h: 16, val: 500 });
            }
            if (frameCount % 120 === 0 && Math.random() > 0.6) {
                obstacles.push({ x: 850, y: 310, w: 40, h: 40 });
            }
        }

        function update(dt) {
            if (!gameActive || enteringScore) return;

            const scalar = dt / 16.66; // Normalize to 60fps
            spawnEntities();

            // Gravity & Timers
            player.vy += GRAVITY * scalar;
            if (coyoteTime > 0) coyoteTime -= dt;
            if (jumpBuffer > 0) jumpBuffer -= dt;

            // Grapple Physics (Pendulum Constraint)
            if (player.hook.active) {
                player.hook.x -= scrollSpeed * scalar;
                const px = player.x + player.w/2;
                const py = player.y + player.h/2;
                const dx = px - player.hook.x;
                const dy = py - player.hook.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist > player.hook.length) {
                    const nx = dx / dist;
                    const ny = dy / dist;

                    // Pull player to rope boundary
                    player.x = player.hook.x + nx * player.hook.length - player.w/2;
                    player.y = player.hook.y + ny * player.hook.length - player.h/2;

                    // Constrain velocity to tangential (perpendicular to rope)
                    const velDotNormal = player.vx * nx + player.vy * ny;
                    if (velDotNormal > 0) {
                        player.vx -= velDotNormal * nx;
                        player.vy -= velDotNormal * ny;
                    }
                    
                    // Swing Boost
                    if (keys['ArrowRight'] || keys['KeyD']) player.vx += SWING_BOOST * scalar;
                    if (keys['ArrowLeft'] || keys['KeyA']) player.vx -= SWING_BOOST * scalar;
                }
            }

            // Standard Movement & Friction
            const friction = player.isGrounded ? GROUND_FRICTION : AIR_FRICTION;
            player.vx *= Math.pow(friction, scalar);
            
            // Auto-center (Ease back to x=100)
            if (!player.hook.active) {
                player.vx += (100 - player.x) * 0.02 * scalar;
            }

            // Apply Velocity
            player.x += player.vx * scalar;
            player.y += player.vy * scalar;

            // Scroll World
            platforms.forEach(p => p.x -= scrollSpeed * scalar);
            items.forEach(i => i.x -= scrollSpeed * scalar);
            obstacles.forEach(o => o.x -= scrollSpeed * scalar);

            // Collision Resolution
            player.isGrounded = false;
            let pHeight = player.isDucking ? player.h / 2 : player.h;
            let pTop = player.isDucking ? player.y + player.h / 2 : player.y;

            for (let p of platforms) {
                if (player.x + player.w > p.x && player.x < p.x + p.w) {
                    // Top collision
                    if (player.vy >= 0 && pTop + pHeight >= p.y && pTop + pHeight <= p.y + 20) {
                        player.y = p.y - player.h; // Always set base Y relative to full height
                        player.vy = 0;
                        player.isGrounded = true;
                        coyoteTime = 100; // 100ms coyote time
                    }
                }
            }

            // Jump Buffering & Execution
            if (jumpBuffer > 0 && (player.isGrounded || coyoteTime > 0)) {
                player.vy = JUMP_POWER;
                player.isGrounded = false;
                coyoteTime = 0;
                jumpBuffer = 0;
                if (player.hook.active) player.hook.active = false;
            }

            // Screen boundaries
            if (player.x < 0) { player.x = 0; player.vx = 0; }
            if (player.x + player.w > canvas.width) { player.x = canvas.width - player.w; player.vx = 0; }
            if (player.y > canvas.height) gameOver();

            // Entities
            for (let o of obstacles) {
                if (player.x < o.x + o.w && player.x + player.w > o.x && 
                    pTop < o.y + o.h && pTop + pHeight > o.y) {
                    gameOver();
                }
            }

            for (let i of items) {
                if (!i.collected && player.x < i.x + i.w && player.x + player.w > i.x && 
                    pTop < i.y + i.h && pTop + pHeight > i.y) {
                    i.collected = true;
                    wallet += i.val;
                    updateUI();
                }
            }

            platforms = platforms.filter(p => p.x + p.w > 0);
            items = items.filter(i => i.x + i.w > 0 && !i.collected);
            obstacles = obstacles.filter(o => o.x + o.w > 0);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Scanlines effect
            ctx.fillStyle = "rgba(0, 255, 65, 0.03)";
            for(let i=0; i<canvas.height; i+=4) ctx.fillRect(0, i, canvas.width, 1);

            ctx.fillStyle = "#111";
            platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

            ctx.fillStyle = "#ff4444";
            obstacles.forEach(o => {
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.strokeStyle = "#fff";
                ctx.strokeRect(o.x+5, o.y+5, o.w-10, o.h-10);
            });

            ctx.fillStyle = "#ffd700";
            items.forEach(i => {
                ctx.beginPath();
                ctx.arc(i.x + i.w/2, i.y + i.h/2, i.w/2, 0, Math.PI*2);
                ctx.fill();
            });

            if (player.hook.active) {
                ctx.strokeStyle = "#00ff41";
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(player.x + player.w / 2, player.y + 10);
                ctx.lineTo(player.hook.x, player.hook.y);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // Draw hook point
                ctx.fillStyle = "#fff";
                ctx.fillRect(player.hook.x-4, player.hook.y-4, 8, 8);
            }

            ctx.fillStyle = player.isDucking ? "#0088ff" : "#00ff41";
            let drawH = player.isDucking ? player.h / 2 : player.h;
            let drawY = player.isDucking ? player.y + player.h / 2 : player.y;
            ctx.fillRect(player.x, drawY, player.w, drawH);
            
            // Player "Eye"
            ctx.fillStyle = "#fff";
            ctx.fillRect(player.x + (player.vx > 0 ? 18 : 4), drawY + 8, 4, 4);

            if (!gameActive && !enteringScore) {
                drawLeaderboard();
            }
        }

        function drawLeaderboard() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            ctx.fillRect(200, 40, 400, 320);
            ctx.strokeStyle = "#00ff41";
            ctx.strokeRect(200, 40, 400, 320);
            
            ctx.fillStyle = "#00ff41";
            ctx.font = "bold 18px 'Courier New'";
            ctx.textAlign = "center";
            ctx.fillText("TOP OPERATIVES", 400, 75);
            
            ctx.font = "14px 'Courier New'";
            highScores.slice(0, 10).forEach((s, i) => {
                let y = 110 + i * 22;
                ctx.textAlign = "left";
                ctx.fillText(`${i+1}. ${s.name}`, 250, y);
                ctx.textAlign = "right";
                ctx.fillText(`$${s.score.toLocaleString()}`, 550, y);
            });
        }

        function loop(time) {
            const dt = time - lastTime;
            lastTime = time;
            
            update(dt);
            draw();
            animationFrameId = requestAnimationFrame(loop);
        }

        function gameOver() {
            if (!gameActive) return;
            gameActive = false;
            checkHighScore();
            if (!enteringScore) {
                showMsg("MISSION FAILED<br><span style='color:#ff4444'>You were eliminated.</span><br><br>Press [ R ] to redeploy.");
            }
        }

        function extract() {
            if (wallet >= 5000 && gameActive) {
                bank += (wallet - 500);
                let finalScore = wallet;
                wallet = 0;
                updateUI();
                gameActive = false;
                checkHighScore(finalScore);
                if (!enteringScore) {
                    showMsg("EXTRACTION SUCCESSFUL<br>Operational fee: $500.<br><br>Press [ R ] for next drop.");
                }
            }
        }

        function checkHighScore(score = wallet) {
            if (score > 0 && (highScores.length < 10 || score > highScores[highScores.length - 1].score)) {
                enteringScore = true;
                initialsOverlay.style.display = "block";
                charIndex = 0;
                updateInitialsDisplay();
            }
        }

        function updateInitialsDisplay() {
            for(let i=0; i<3; i++) {
                const el = document.getElementById('l' + i);
                el.innerText = currentInitials[i];
                el.classList.toggle('active', i === charIndex);
            }
        }

        function saveScore() {
            const name = currentInitials.join('');
            highScores.push({ name, score: wallet });
            highScores.sort((a, b) => b.score - a.score);
            highScores = highScores.slice(0, 10);
            localStorage.setItem('exoborn_scores', JSON.stringify(highScores));
            enteringScore = false;
            initialsOverlay.style.display = "none";
            showMsg("SCORE RECORDED<br>Operative " + name + " verified.<br><br>Press [ R ] to redeploy.");
        }

        function showMsg(txt) {
            msgEl.innerHTML = txt;
            msgEl.style.display = "block";
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            
            if (enteringScore) {
                if (e.code === 'ArrowUp') {
                    let idx = alphabet.indexOf(currentInitials[charIndex]);
                    currentInitials[charIndex] = alphabet[(idx + 1) % alphabet.length];
                }
                if (e.code === 'ArrowDown') {
                    let idx = alphabet.indexOf(currentInitials[charIndex]);
                    currentInitials[charIndex] = alphabet[(idx - 1 + alphabet.length) % alphabet.length];
                }
                if (e.code === 'Space' || e.code === 'Enter') {
                    if (charIndex < 2) charIndex++;
                    else saveScore();
                }
                updateInitialsDisplay();
                return;
            }

            if (e.code === 'Space' && gameActive) jumpBuffer = 200; // 200ms buffer
            if (e.code === 'ArrowDown' && gameActive) player.isDucking = true;
            if (e.code === 'KeyE') extract();
            if (e.code === 'KeyR' && !gameActive && !enteringScore) {
                initLevel();
            }
        });

        window.addEventListener('keyup', e => {
            keys[e.code] = false;
            if (e.code === 'ArrowDown') player.isDucking = false;
            if (e.code === 'Space' && player.vy < -5) player.vy *= 0.5; // Variable jump height
        });

        canvas.addEventListener('mousedown', e => {
            if (!gameActive || enteringScore) return;
            const rect = canvas.getBoundingClientRect();
            const targetX = e.clientX - rect.left;
            const targetY = e.clientY - rect.top;

            let validTarget = false;
            for (let p of platforms) {
                if (targetX >= p.x && targetX <= p.x + p.w && targetY >= p.y && targetY <= p.y + p.h) {
                    validTarget = true;
                    break;
                }
            }

            if (validTarget) {
                player.hook.x = targetX;
                player.hook.y = targetY;
                const dx = (player.x + player.w/2) - targetX;
                const dy = (player.y + player.h/2) - targetY;
                player.hook.length = Math.sqrt(dx*dx + dy*dy);
                player.hook.active = true;
                player.vy -= 2; // Initial tug
            }
        });

        canvas.addEventListener('mouseup', () => {
            player.hook.active = false;
        });

        requestAnimationFrame(loop);
        initLevel();
    </script>
</body>
</html>
