<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EXOBÖRN</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --retro-yellow: #ffb000;
            --retro-dim: #664400;
            --retro-black: #050400;
            --retro-white: #fff5e0;
            --tier-2: #00d4ff;
            --tier-3: #ff00ff;
        }
        body { background: var(--retro-black); color: var(--retro-yellow); font-family: 'Press Start 2P', cursive; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #ui { width: 1000px; display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid var(--retro-yellow); padding-bottom: 10px; text-shadow: 0 0 10px var(--retro-yellow); font-size: 12px; }
        canvas { border: 4px solid var(--retro-dim); background: #080700; box-shadow: 0 0 40px rgba(255, 176, 0, 0.2); cursor: crosshair; image-rendering: pixelated; }
        .controls { margin-top: 25px; font-size: 10px; color: var(--retro-white); text-align: center; line-height: 2; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 5px var(--retro-yellow); }
        #initials-overlay { position: absolute; background: rgba(5,4,0,0.98); border: 4px solid var(--retro-yellow); padding: 50px; display: none; text-align: center; z-index: 100; box-shadow: 0 0 150px #000; color: var(--retro-yellow); }
        .letter { font-size: 40px; margin: 0 15px; display: inline-block; width: 40px; border-bottom: 6px solid var(--retro-yellow); padding-bottom: 10px; }
        .letter.active { color: var(--retro-white); border-color: var(--retro-white); animation: blink 0.4s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        #msg { position: absolute; color: var(--retro-white); background: rgba(5,4,0,0.95); padding: 30px; display: none; text-align: center; border: 4px solid var(--retro-yellow); max-width: 600px; line-height: 2; box-shadow: 0 0 50px rgba(255,176,0,0.3); font-size: 12px; z-index: 50; }
    </style>
</head>
<body>
    <div id="ui">
        <div>BANK: $<span id="bank">0</span></div>
        <div style="color: var(--retro-white); font-weight: bold; letter-spacing: 4px;">EXOBÖRN</div>
        <div>CURR: $<span id="current">0</span></div>
    </div>
    <canvas id="gameCanvas" width="1000" height="500"></canvas>
    <div id="msg"></div>
    <div id="initials-overlay">
        <h2 style="color: var(--retro-white); margin-top: 0; font-size: 18px; margin-bottom: 30px;">GLOBAL RECORD</h2>
        <p style="font-size: 10px; margin-bottom: 40px;">IDENTIFY OPERATIVE</p>
        <div id="initials-container">
            <span class="letter active" id="l0">A</span>
            <span class="letter" id="l1">A</span>
            <span class="letter" id="l2">A</span>
        </div>
        <p style="font-size: 8px; margin-top: 50px; color: var(--retro-dim);">[UP/DOWN] CYCLE | [SPACE] LOCK</p>
    </div>
    <div class="controls">
        <span style="color: var(--retro-yellow)">W/SPACE/UP:</span> JUMP | <span style="color: var(--retro-yellow)">A/D or LEFT/RIGHT:</span> MOVE | <span style="color: var(--retro-yellow)">S/DOWN:</span> DUCK/SLIDE | <span style="color: var(--retro-yellow)">CLICK PLATFORM:</span> GRAPPLE <br>
        <span style="color: var(--retro-yellow)">W/S (HOOKED):</span> REEL IN/OUT | <span style="color: var(--retro-yellow)">E:</span> EXTRACT ($5000+) | <span style="color: var(--retro-yellow)">R:</span> DEPLOY
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bankEl = document.getElementById('bank');
        const currentEl = document.getElementById('current');
        const msgEl = document.getElementById('msg');
        const initialsOverlay = document.getElementById('initials-overlay');

        const API_URL = 'scores.php'; 

        // --- AUDIO ENGINE ---
        let audioCtx = null;
        let mainGain = null;
        let musicGain = null;
        let isMusicPlaying = false;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            mainGain = audioCtx.createGain();
            mainGain.connect(audioCtx.destination);
            mainGain.gain.value = 0.3;

            musicGain = audioCtx.createGain();
            musicGain.connect(mainGain);
            musicGain.gain.value = 0.2;
            startMusic();
        }

        function playSfx(freq, type, duration, slide = 0, volume = 1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if (slide) osc.frequency.exponentialRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
            g.gain.setValueAtTime(volume, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(g);
            g.connect(mainGain);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function startMusic() {
            if (isMusicPlaying) return;
            isMusicPlaying = true;
            const tempo = 140;
            const step = 60 / tempo / 2;
            let bar = 0;
            
            const bassline = [40, 40, 45, 40, 38, 38, 43, 40];
            const lead = [null, 60, 64, 67, 72, 67, 64, 60, null, 62, 65, 69, 74, 69, 65, 62];

            function playBar() {
                for (let i = 0; i < 8; i++) {
                    const time = audioCtx.currentTime + i * step;
                    // Bass
                    const bFreq = 440 * Math.pow(2, (bassline[bar % 8] - 69) / 12);
                    const bOsc = audioCtx.createOscillator();
                    const bG = audioCtx.createGain();
                    bOsc.type = 'square';
                    bOsc.frequency.setValueAtTime(bFreq, time);
                    bG.gain.setValueAtTime(0.1, time);
                    bG.gain.exponentialRampToValueAtTime(0.01, time + step * 0.8);
                    bOsc.connect(bG);
                    bG.connect(musicGain);
                    bOsc.start(time);
                    bOsc.stop(time + step);

                    // Melody (Silly quirky lead)
                    if (bar % 2 === 0 && Math.random() > 0.3) {
                        const note = lead[Math.floor(Math.random() * lead.length)];
                        if (note) {
                            const lFreq = 440 * Math.pow(2, (note - 69) / 12);
                            const lOsc = audioCtx.createOscillator();
                            const lG = audioCtx.createGain();
                            lOsc.type = 'triangle';
                            lOsc.frequency.setValueAtTime(lFreq, time);
                            lG.gain.setValueAtTime(0.08, time);
                            lG.gain.exponentialRampToValueAtTime(0.01, time + step * 1.5);
                            lOsc.connect(lG);
                            lG.connect(musicGain);
                            lOsc.start(time);
                            lOsc.stop(time + step * 2);
                        }
                    }
                }
                bar++;
                setTimeout(playBar, step * 8 * 1000);
            }
            playBar();
        }

        // SFX Trigger Functions
        const sfx = {
            jump: () => playSfx(150, 'square', 0.2, 400),
            loot1: () => playSfx(880, 'triangle', 0.1, 200),
            loot2: () => { playSfx(880, 'triangle', 0.1); setTimeout(() => playSfx(1320, 'triangle', 0.1), 50); },
            loot3: () => { playSfx(1320, 'square', 0.1); setTimeout(() => playSfx(1760, 'square', 0.1), 50); setTimeout(() => playSfx(2640, 'square', 0.1), 100); },
            hook: () => playSfx(400, 'sawtooth', 0.1, -200, 0.5),
            death: () => playSfx(300, 'sawtooth', 1.5, -280, 0.8),
            win: () => { [60, 64, 67, 72].forEach((n, i) => setTimeout(() => playSfx(440 * Math.pow(2, (n - 69) / 12), 'triangle', 0.4), i * 150)); }
        };

        // --- GAME LOGIC ---
        let bank = 0;
        let wallet = 0;
        let gameActive = false;
        let animationFrameId;
        let lastTime = 0;
        let enteringScore = false;
        let showLeaderboard = true;
        let currentInitials = ['A', 'A', 'A'];
        let charIndex = 0;
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!?#";

        const GRAVITY = 0.52;
        const JUMP_POWER = -12.5;
        const AIR_FRICTION = 0.992;
        const GROUND_FRICTION = 0.84;
        const SWING_BOOST = 0.55;
        const HOOK_MAX_LENGTH = 300;
        const HOOK_REEL_SPEED = 1.5;
        const HOOK_DAMPING = 0.995;

        let coyoteTime = 0;
        let jumpBuffer = 0;
        let nearMissTimer = 0;
        let difficultyWave = 0;
        let safeZoneCounter = 0;

        const player = {
            x: 150, y: 250, w: 24, h: 44,
            vx: 0, vy: 0,
            isGrounded: false,
            isDucking: false,
            hook: { active: false, x: 0, y: 0, length: 0, anchorPlatform: null }
        };

        let bgLayers = [
            { speed: 0.1, elements: [] },
            { speed: 0.3, elements: [] },
            { speed: 0.6, elements: [] }
        ];

        let platforms = [];
        let items = [];
        let obstacles = [];
        let baseSpeed = 3.0;
        let scrollSpeed = baseSpeed;
        let frameCount = 0;
        let keys = {};
        let lastPlatformEndX = 1200;

        let highScores = [];
        let leaderboardStatus = "LOADING"; 
        let lastError = "";

        async function fetchScores() {
            leaderboardStatus = "LOADING";
            try {
                const res = await fetch(API_URL + "?t=" + Date.now());
                const data = await res.json();
                if (!res.ok) {
                    lastError = data.error || "Server error";
                    leaderboardStatus = "ERROR";
                } else {
                    highScores = Array.isArray(data) ? data : [];
                    leaderboardStatus = highScores.length > 0 ? "READY" : "EMPTY";
                }
            } catch (err) {
                leaderboardStatus = "ERROR";
                lastError = "Connection Failed";
            }
        }

        async function submitScore(name, score) {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, score })
                });
                highScores = await res.json();
                leaderboardStatus = "READY";
            } catch (err) {
                leaderboardStatus = "ERROR";
                lastError = "Save Failed";
            }
        }

        function initLevel() {
            initAudio();
            platforms = [{ x: 0, y: 450, w: 1200, h: 50 }];
            lastPlatformEndX = 1200; lastPlatformY = 450;
            items = []; obstacles = [];
            player.x = 150; player.y = 250; player.vx = 0; player.vy = 0;
            player.hook.active = false; player.hook.anchorPlatform = null;
            player.isDucking = false; wallet = 0;
            nearMissTimer = 0; difficultyWave = 0; safeZoneCounter = 0; frameCount = 0;
            keys = {};
            scrollSpeed = baseSpeed; updateUI();
            gameActive = true; enteringScore = false; showLeaderboard = false;
            msgEl.style.display = "none"; initialsOverlay.style.display = "none";
            lastTime = performance.now();
        }

        function formatScore(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 100000) return (n / 1000).toFixed(0) + 'K';
            return n.toLocaleString();
        }

        function updateUI() {
            currentEl.innerText = formatScore(wallet);
            bankEl.innerText = formatScore(bank);
            // Logarithmic speed curve with cap — collecting loot ramps difficulty gently, not punitively
            const rawBoost = Math.log2(1 + wallet / 3000) * 1.8;
            const maxBoost = 4.5;
            scrollSpeed = gameActive ? baseSpeed + Math.min(rawBoost, maxBoost) : baseSpeed;
        }

        let lastPlatformY = 450;

        function spawnEntities() {
            frameCount++;
            difficultyWave = 0.5 + 0.5 * Math.sin(frameCount * 0.003); // oscillates 0..1
            const diff = Math.min(1.2, (scrollSpeed - baseSpeed) / 6);
            const waveDiff = diff * (0.4 + 0.6 * difficultyWave); // difficulty breathes

            if (lastPlatformEndX < canvas.width + 500) {
                safeZoneCounter++;
                // Cap gap to what's physically jumpable (jump covers ~200px horizontal at max speed)
                const maxGap = 160 + 60 * waveDiff;
                const minGap = 60;
                const gap = minGap + Math.random() * (maxGap - minGap);
                // Constrain height relative to previous platform (max 60px change, reachable by jump)
                const heightDelta = (Math.random() - 0.45) * 60;
                const newY = Math.max(340, Math.min(470, lastPlatformY + heightDelta));
                // Minimum width scales down gently with difficulty, but stays usable
                const minW = Math.max(150, 250 - waveDiff * 80);
                const w = minW + Math.random() * 400;
                // Every 5th platform is a safe zone (wide, stable)
                const isSafe = safeZoneCounter % 5 === 0;
                const finalW = isSafe ? Math.max(w, 400) : w;

                platforms.push({ x: lastPlatformEndX + gap, y: newY, w: finalW, h: 100 });
                lastPlatformEndX = lastPlatformEndX + gap + finalW;
                lastPlatformY = newY;
            }
            // Floating platforms — spawn relative to nearby ground level, always reachable
            if (frameCount % 100 === 0) {
                const floatY = Math.max(80, lastPlatformY - 140 - Math.random() * 120);
                platforms.push({ x: canvas.width, y: floatY, w: 100 + Math.random() * 60, h: 20 });
            }
            if (frameCount % 55 === 0) {
                const luck = Math.random();
                if (luck > 0.94) {
                    const ty = 40 + Math.random() * 80;
                    items.push({ x: canvas.width, y: ty, w: 22, h: 22, val: 7500, tier: 3 });
                    obstacles.push({ x: canvas.width + 40, y: ty + (Math.random() - 0.5) * 30, w: 35, h: 35 });
                } else if (luck > 0.72) {
                    items.push({ x: canvas.width, y: 140 + Math.random() * 120, w: 18, h: 18, val: 2500, tier: 2 });
                } else if (luck > 0.35) {
                    items.push({ x: canvas.width, y: 280 + Math.random() * 100, w: 15, h: 15, val: 500, tier: 1 });
                }
                // Obstacles scale with difficulty wave — breather moments have fewer obstacles
                if (Math.random() < 0.2 + waveDiff * 0.4) {
                    const oy = 100 + Math.random() * 280;
                    obstacles.push({ x: canvas.width, y: oy, w: 30 + waveDiff * 15, h: 30 + waveDiff * 15 });
                }
            }
        }

        function update(dt) {
            const scalar = dt / 16.66;
            bgLayers.forEach(l => l.elements.forEach(e => {
                e.x -= scrollSpeed * l.speed * scalar;
                if (e.x + e.w < 0) e.x = canvas.width + Math.random() * 100;
            }));
            if (!gameActive || enteringScore) return;
            spawnEntities();
            player.vy += GRAVITY * scalar;
            if (coyoteTime > 0) coyoteTime -= dt;
            if (jumpBuffer > 0) jumpBuffer -= dt;
            lastPlatformEndX -= scrollSpeed * scalar;
            platforms.forEach(p => p.x -= scrollSpeed * scalar);
            items.forEach(i => i.x -= scrollSpeed * scalar);
            obstacles.forEach(o => o.x -= scrollSpeed * scalar);
            if (player.hook.active) {
                // Anchor moves with its platform (not raw scroll) for stability
                const ap = player.hook.anchorPlatform;
                if (ap) {
                    player.hook.x = ap.x + player.hook.anchorOffsetX;
                    player.hook.y = ap.y;
                }
                // Reel in when holding up, reel out when holding down
                if (keys['ArrowUp'] || keys['KeyW']) player.hook.length = Math.max(60, player.hook.length - HOOK_REEL_SPEED * scalar);
                if (keys['ArrowDown'] || keys['KeyS']) player.hook.length = Math.min(HOOK_MAX_LENGTH, player.hook.length + HOOK_REEL_SPEED * scalar);

                const cx = player.x + player.w / 2, cy = player.y + player.h / 2;
                const dx = cx - player.hook.x, dy = cy - player.hook.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > player.hook.length) {
                    // Rope is taut — apply pendulum constraint
                    const nx = dx / dist, ny = dy / dist;
                    // Project position back onto rope circle
                    player.x = player.hook.x + nx * player.hook.length - player.w / 2;
                    player.y = player.hook.y + ny * player.hook.length - player.h / 2;
                    // Remove radial velocity component, preserve tangential (pendulum swing)
                    const radialV = player.vx * nx + player.vy * ny;
                    if (radialV > 0) {
                        player.vx -= radialV * nx;
                        player.vy -= radialV * ny;
                    }
                    // Add tangential swing force from input
                    const tx = -ny, ty = nx; // tangent vector (perpendicular to rope)
                    if (keys['ArrowRight'] || keys['KeyD']) { player.vx += tx * SWING_BOOST * scalar; player.vy += ty * SWING_BOOST * scalar; }
                    if (keys['ArrowLeft'] || keys['KeyA']) { player.vx -= tx * SWING_BOOST * scalar; player.vy -= ty * SWING_BOOST * scalar; }
                }
                // Gentle damping to prevent wild oscillations
                player.vx *= Math.pow(HOOK_DAMPING, scalar);
                player.vy *= Math.pow(HOOK_DAMPING, scalar);

                // Detach if anchor platform scrolled off screen
                if (ap && ap.x + ap.w < -50) player.hook.active = false;
            }
            // Player horizontal movement — ground has full authority, air has reduced control
            if (!player.hook.active) {
                const moveForce = (player.isGrounded || coyoteTime > 0) ? 0.6 : 0.3;
                if (keys['ArrowRight'] || keys['KeyD']) player.vx += moveForce * scalar;
                if (keys['ArrowLeft'] || keys['KeyA']) player.vx -= moveForce * scalar;
                // Duck-slide: ducking on ground gives a speed burst
                if (player.isDucking && player.isGrounded && Math.abs(player.vx) > 0.5) player.vx *= 1.01;
            }
            // Friction: hook has its own damping, don't double-apply
            if (!player.hook.active) {
                player.vx *= Math.pow(player.isGrounded ? GROUND_FRICTION : AIR_FRICTION, scalar);
            }
            // Soft auto-centering — only when grounded, idle, and far from center
            const driftFromCenter = 150 - player.x;
            if (!player.hook.active && player.isGrounded && !keys['ArrowRight'] && !keys['KeyD'] && !keys['ArrowLeft'] && !keys['KeyA'] && Math.abs(driftFromCenter) > 40) {
                player.vx += driftFromCenter * 0.003 * scalar;
            }
            player.x += player.vx * scalar; player.y += player.vy * scalar;
            if (nearMissTimer > 0) nearMissTimer -= dt;
            player.isGrounded = false;
            let pH = player.isDucking ? player.h / 2 : player.h;
            let pT = player.isDucking ? player.y + player.h / 2 : player.y;
            for (let p of platforms) {
                if (player.x + player.w > p.x && player.x < p.x + p.w) {
                    if (player.vy >= 0 && pT + pH >= p.y && pT + pH <= p.y + 30) {
                        player.y = p.y - player.h; player.vy = 0; player.isGrounded = true; coyoteTime = 120;
                    }
                }
            }
            if (jumpBuffer > 0 && (player.isGrounded || coyoteTime > 0)) {
                sfx.jump();
                player.vy = JUMP_POWER; player.isGrounded = false; coyoteTime = 0; jumpBuffer = 0;
                player.hook.active = false;
            }
            if (player.x < 0) { player.x = 0; player.vx = 0; }
            if (player.x + player.w > canvas.width) { player.x = canvas.width - player.w; player.vx = 0; }
            if (player.y > canvas.height) gameOver();
            for (let o of obstacles) {
                if (player.x < o.x + o.w && player.x + player.w > o.x && pT < o.y + o.h && pT + pH > o.y) { gameOver(); break; }
                // Near-miss detection — reward close calls with brief visual juice
                const nearPad = 12;
                if (nearMissTimer <= 0 && player.x < o.x + o.w + nearPad && player.x + player.w + nearPad > o.x && pT < o.y + o.h + nearPad && pT + pH + nearPad > o.y) {
                    if (!(player.x < o.x + o.w && player.x + player.w > o.x && pT < o.y + o.h && pT + pH > o.y)) {
                        nearMissTimer = 400; // 400ms of "close call" visual feedback
                        wallet += 100; // small reward for skillful play
                        updateUI();
                    }
                }
            }
            for (let i of items) if (!i.collected && player.x < i.x + i.w && player.x + player.w > i.x && pT < i.y + i.h && pT + pH > i.y) {
                i.collected = true; wallet += i.val; updateUI();
                if (i.tier === 1) sfx.loot1(); else if (i.tier === 2) sfx.loot2(); else sfx.loot3();
            }
            platforms = platforms.filter(p => p.x + p.w > -100);
            items = items.filter(i => i.x + i.w > -100 && !i.collected);
            obstacles = obstacles.filter(o => o.x + o.w > -100);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bgLayers.forEach((l, i) => {
                ctx.fillStyle = i === 0 ? "#0c0a00" : (i === 1 ? "#151200" : "#1f1a00");
                l.elements.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));
            });
            ctx.fillStyle = "rgba(255, 176, 0, 0.05)";
            for(let i=0; i<canvas.height; i+=4) ctx.fillRect(0, i, canvas.width, 2);
            if (gameActive) {
                ctx.fillStyle = "#332800"; platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
                obstacles.forEach(o => {
                    ctx.fillStyle = "#ff5500"; ctx.fillRect(o.x, o.y, o.w, o.h);
                    ctx.strokeStyle = "#ffb000"; ctx.lineWidth = 2; ctx.strokeRect(o.x+4, o.y+4, o.w-8, o.h-8);
                    if (frameCount % 20 < 10) { ctx.fillStyle = "#fff"; ctx.fillRect(o.x + o.w/2 - 2, o.y + o.h/2 - 2, 4, 4); }
                });
                items.forEach(i => {
                    ctx.fillStyle = i.tier === 2 ? "#00d4ff" : (i.tier === 3 ? "#ff00ff" : "#ffb000");
                    ctx.beginPath(); ctx.arc(i.x + i.w/2, i.y + i.h/2, i.w/2, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#fff"; ctx.fillRect(i.x + i.w/4, i.y + i.h/4, i.w/4, i.h/4);
                });
                if (player.hook.active) {
                    ctx.strokeStyle = "#ffb000"; ctx.lineWidth = 1; ctx.setLineDash([8, 4]);
                    ctx.beginPath(); ctx.moveTo(player.x + player.w / 2, player.y + 10); ctx.lineTo(player.hook.x, player.hook.y); ctx.stroke();
                    ctx.setLineDash([]); ctx.fillStyle = "#fff"; ctx.fillRect(player.hook.x-5, player.hook.y-5, 10, 10);
                }
                ctx.fillStyle = nearMissTimer > 0 ? "#ffffff" : (player.isDucking ? "#886000" : "#ffb000");
                let dH = player.isDucking ? player.h / 2 : player.h, dY = player.isDucking ? player.y + player.h / 2 : player.y;
                ctx.fillRect(player.x, dY, player.w, dH);
                ctx.fillStyle = "#fff"; ctx.fillRect(player.x + (player.vx > 0 ? 16 : 4), dY + 6, 5, 5);
                // Near-miss flash
                if (nearMissTimer > 0) {
                    ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#fff"; ctx.font = "8px 'Press Start 2P'"; ctx.textAlign = "center";
                    ctx.fillText("CLOSE CALL +$100", player.x + player.w / 2, dY - 10);
                }
            }
            if (showLeaderboard && !enteringScore) {
                ctx.fillStyle = "rgba(5, 4, 0, 0.9)"; ctx.fillRect(250, 60, 500, 380);
                ctx.strokeStyle = "#ffb000"; ctx.lineWidth = 4; ctx.strokeRect(250, 60, 500, 380);
                ctx.fillStyle = "#ffb000"; ctx.font = "16px 'Press Start 2P'"; ctx.textAlign = "center";
                ctx.fillText("GLOBAL ELITE", 500, 110);
                ctx.font = "10px 'Press Start 2P'";
                if (leaderboardStatus === "LOADING") ctx.fillText("CONNECTING...", 500, 240);
                else if (leaderboardStatus === "ERROR") {
                    ctx.fillStyle = "#ff5500"; ctx.fillText("DB ACCESS ERROR", 500, 220);
                    ctx.font = "7px 'Press Start 2P'"; ctx.fillText(lastError.toUpperCase().substring(0, 40), 500, 260);
                } else if (leaderboardStatus === "EMPTY") ctx.fillText("NO DATA LOGGED", 500, 240);
                else {
                    highScores.forEach((s, i) => {
                        ctx.textAlign = "left"; ctx.fillText(`${(i+1).toString().padStart(2, '0')} ${s.name}`, 300, 160 + i * 26);
                        ctx.textAlign = "right"; ctx.fillText(`$${formatScore(s.score)}`, 700, 160 + i * 26);
                    });
                }
                if (!gameActive) { ctx.textAlign = "center"; ctx.fillStyle = "#fff5e0"; ctx.fillText("PRESS [R] TO DEPLOY", 500, 410); }
            }
        }

        function loop(time) { const dt = Math.min(time - lastTime, 50); lastTime = time; update(dt); draw(); animationFrameId = requestAnimationFrame(loop); }
        function gameOver() { if (!gameActive) return; gameActive = false; sfx.death(); checkHighScore(); if (!enteringScore) { showMsg("<span style='color:#ff5500; font-size: 16px;'>SYSTEM FAILURE</span><br><br>Unit destroyed. Data scrubbed.<br><br>[R] TO REBOOT"); showLeaderboard = true; fetchScores(); } }
        function extract() { if (wallet >= 5000 && gameActive) { bank += (wallet - 500); let f = wallet; wallet = 0; sfx.win(); updateUI(); gameActive = false; checkHighScore(f); if (!enteringScore) { showMsg("<span style='color:#ffb000; font-size: 16px;'>EXTRACTION COMPLETE</span><br><br>Security fee: $500.<br><br>[R] FOR NEW DROP"); showLeaderboard = true; fetchScores(); } } }
        let pendingScore = 0;
        function checkHighScore(s = wallet) { pendingScore = s; if (s > 0 && (highScores.length < 10 || s > highScores[highScores.length - 1]?.score)) { enteringScore = true; initialsOverlay.style.display = "block"; charIndex = 0; updateInitialsDisplay(); } }
        function updateInitialsDisplay() { for(let i=0; i<3; i++) { const el = document.getElementById('l' + i); el.innerText = currentInitials[i]; el.classList.toggle('active', i === charIndex); } }
        async function saveScore() { const n = currentInitials.join(''); await submitScore(n, pendingScore); enteringScore = false; initialsOverlay.style.display = "none"; showLeaderboard = true; showMsg("<span style='color:#ffb000;'>DATA ARCHIVED</span><br><br>Operative " + n + " logged.<br><br>[R] TO REBOOT"); }
        function showMsg(t) { msgEl.innerHTML = t; msgEl.style.display = "block"; }
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (enteringScore) {
                if (e.code === 'ArrowUp') { let idx = alphabet.indexOf(currentInitials[charIndex]); currentInitials[charIndex] = alphabet[(idx + 1) % alphabet.length]; }
                if (e.code === 'ArrowDown') { let idx = alphabet.indexOf(currentInitials[charIndex]); currentInitials[charIndex] = alphabet[(idx - 1 + alphabet.length) % alphabet.length]; }
                if (e.code === 'Space' || e.code === 'Enter') { if (charIndex < 2) charIndex++; else saveScore(); }
                updateInitialsDisplay(); return;
            }
            if ((e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') && gameActive) jumpBuffer = 200;
            if ((e.code === 'ArrowDown' || e.code === 'KeyS') && gameActive && !player.hook.active) player.isDucking = true;
            if (e.code === 'KeyE') extract();
            if (e.code === 'KeyR' && (!gameActive || !showLeaderboard) && !enteringScore) initLevel();
        });
        window.addEventListener('keyup', e => { keys[e.code] = false; if (e.code === 'ArrowDown' || e.code === 'KeyS') player.isDucking = false; if ((e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') && player.vy < -5) player.vy *= 0.5; });
        canvas.addEventListener('mousedown', e => {
            if (!gameActive || enteringScore) return;
            const r = canvas.getBoundingClientRect();
            const scaleX = canvas.width / r.width, scaleY = canvas.height / r.height;
            const tX = (e.clientX - r.left) * scaleX, tY = (e.clientY - r.top) * scaleY;
            let targetPlatform = null;
            for (let p of platforms) {
                if (tX >= p.x && tX <= p.x + p.w && tY >= p.y && tY <= p.y + p.h) { targetPlatform = p; break; }
            }
            if (targetPlatform) {
                sfx.hook();
                // Anchor to the top edge of the platform at click X
                const anchorX = tX;
                const anchorY = targetPlatform.y;
                player.hook.x = anchorX;
                player.hook.y = anchorY;
                player.hook.anchorPlatform = targetPlatform;
                player.hook.anchorOffsetX = anchorX - targetPlatform.x;
                const dx = (player.x + player.w / 2) - anchorX, dy = (player.y + player.h / 2) - anchorY;
                player.hook.length = Math.min(Math.sqrt(dx * dx + dy * dy), HOOK_MAX_LENGTH);
                player.hook.active = true;
                // No arbitrary impulse — the pendulum physics handle momentum naturally
            }
        });
        canvas.addEventListener('mouseup', () => player.hook.active = false);
        for(let i=0; i<3; i++) for(let j=0; j<12; j++) bgLayers[i].elements.push({ x: j * (canvas.width/6) + Math.random() * 50, y: 50 + Math.random() * 350, w: 20 + Math.random() * 80, h: 100 + Math.random() * 500 });
        fetchScores(); requestAnimationFrame(loop);
    </script>
</body>
</html>
